name: Feature request
description: Propose a focused product improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the problem without private user or infrastructure data.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Product and privacy boundaries
      description: What must remain out of scope?
