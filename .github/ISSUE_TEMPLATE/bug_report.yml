name: Bug report
description: Report a reproducible MediaHub defect without private data.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, personal viewing data, private URLs, or security vulnerabilities. Use SECURITY.md for vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal steps using synthetic data.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision or version
  - type: textarea
    id: validation
    attributes:
      label: Additional context
      description: Sanitized logs or screenshots only.
